<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CalculinoHub – We'll be right back</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
      color: #f8fafc;
      padding: 1.5rem;
    }
    .card {
      max-width: 480px;
      text-align: center;
      padding: 3rem 2rem;
      background: rgba(255,255,255,0.05);
      border-radius: 1.5rem;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
    }
    .logo {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.5rem;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s ease-in-out infinite;
    }
    .icon svg {
      width: 44px;
      height: 44px;
      opacity: 0.95;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.9; }
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 1rem;
      color: #94a3b8;
      line-height: 1.6;
    }
    .hint {
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">CalculinoHub</div>
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2v4m0 12v4M2 12h4m12 0h4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83M19.07 4.93l-2.83 2.83m-8.48 8.48l-2.83 2.83" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <path d="M12 8a4 4 0 1 1 0 8 4 4 0 0 1 0-8z" stroke="white" stroke-width="2" fill="rgba(255,255,255,0.2)"/>
      </svg>
    </div>
    <h1>We'll be right back</h1>
    <p>We're updating our calculators. This usually takes a minute or two.</p>
    <p class="hint">Please refresh the page in a moment.</p>
  </div>
</body>
</html>
